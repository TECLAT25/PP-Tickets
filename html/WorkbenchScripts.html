<script>
(function () {
  'use strict';

  var queues = {
    all: {},
    new: {status: 'NEW'},
    critical: {priority: 'CRITICAL'},
    breached: {breached: true},
    pending: {status: 'PENDING_CUSTOMER'},
    warranty: {category: 'WARRANTY'}
  };

  function addCss() {
    if (document.getElementById('workbench-css')) return;
    var css = '.app.support-shell{display:grid!important;grid-template-columns:1fr!important;width:100vw!important;max-width:100vw!important;overflow:hidden!important}' +
      '.navigation{display:none!important}' +
      '.main.support-main{width:100vw!important;max-width:100vw!important;height:100vh!important;padding:6px!important;overflow:hidden!important}' +
      '.support-topbar{height:48px!important;min-height:48px!important;margin-bottom:6px!important;padding:0 18px!important}' +
      '#view-dashboard{display:none!important}' +
      '#view-customer{display:none!important}' +
      '#view-tickets.view.is-active{display:grid!important}' +
      '.support-workbench{display:grid!important;grid-template-columns:112px 245px minmax(0,1fr)!important;gap:6px!important;height:calc(100vh - 60px)!important;min-height:0!important;width:100%!important;max-width:100%!important;overflow:hidden!important}' +
      '.queue-panel,.ticket-list-panel,.support-detail{height:100%!important;min-height:0!important;overflow:auto!important}' +
      '.queue-panel{padding:7px!important}' +
      '.queue-title h2{font-size:14px!important;margin:0!important}' +
      '.queue-title .eyebrow{font-size:9px!important}' +
      '.queue-list{display:grid;gap:5px;margin-bottom:8px}' +
      '.queue-item{display:flex;justify-content:space-between;align-items:center;min-height:30px;padding:0 7px;border:1px solid var(--outline-variant);border-radius:9px;background:var(--surface-bright);color:var(--on-surface);cursor:pointer;font-size:11px}' +
      '.queue-item.is-active{background:var(--primary-container);color:var(--on-primary-container);font-weight:800}' +
      '.compact-filters{display:none!important}' +
      '.ticket-list-panel{padding:7px!important}' +
      '.ticket-list-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px;margin-bottom:5px}' +
      '.ticket-list-header h1{font-size:17px!important;margin:0!important}' +
      '.ticket-list-header .eyebrow,.muted{font-size:10px!important;color:var(--on-surface-variant)}' +
      '.count-badge{font-size:10px!important;padding:3px 7px!important}' +
      '.ticket-list-tools{margin-bottom:5px!important}' +
      '.ticket-card-table thead{display:none}' +
      '.ticket-card-table table,.ticket-card-table tbody,.ticket-card-table tr,.ticket-card-table td{display:block}' +
      '.ticket-card-table tbody{display:grid;gap:5px}' +
      '.ticket-card-table tr{padding:7px;border:1px solid var(--outline-variant);border-radius:9px;background:var(--surface-bright);cursor:pointer}' +
      '.ticket-card-table tr.is-selected{border-color:var(--primary);background:var(--primary-container)}' +
      '.ticket-card-table td{border:0!important;padding:0!important}' +
      '.ticket-card-table td:nth-child(1){font-weight:800;margin-bottom:5px;font-size:11px!important}' +
      '.ticket-subject{font-size:11px!important;line-height:1.2!important;max-height:28px!important;overflow:hidden!important}' +
      '.ticket-card-table td:nth-child(2),.ticket-card-table td:nth-child(3){display:inline-flex;margin:0 4px 5px 0;padding:2px 6px!important;border-radius:12px;background:var(--surface-container-high);font-size:9px;text-transform:uppercase}' +
      '.ticket-card-table td:nth-child(4),.ticket-card-table td:nth-child(5){font-size:10px!important;color:var(--on-surface-variant)!important;white-space:nowrap!important;overflow:hidden!important;text-overflow:ellipsis!important}' +
      '.support-detail{display:grid!important;grid-template-rows:auto minmax(0,1fr) auto!important;padding:0!important;overflow:hidden!important}' +
      '.support-detail .detail-header{position:relative!important;top:auto!important;z-index:2!important;padding:7px 10px!important;border-bottom:1px solid var(--outline-variant)!important;background:var(--surface)!important}' +
      '.support-detail .detail-header .eyebrow{font-size:10px!important;line-height:1!important}' +
      '.support-detail .detail-header h2{font-size:17px!important;line-height:1.15!important;margin:2px 0 5px!important}' +
      '.support-detail .detail-chips{display:inline-flex!important;gap:5px!important;margin:0 8px 0 0!important;vertical-align:middle!important}' +
      '.support-detail .detail-chips .chip{font-size:9px!important;padding:3px 7px!important}' +
      '.support-detail .detail-grid{display:none!important}' +
      '.ticket-actions{display:grid!important;grid-template-columns:120px 120px 140px minmax(140px,1fr) 70px!important;gap:6px!important;padding:6px!important;margin-top:6px!important;border-radius:12px!important}' +
      '.ticket-action-field{gap:3px!important;font-size:9px!important}' +
      '.ticket-action-field span{font-size:9px!important}' +
      '.ticket-action-field select,.ticket-action-field input{min-height:32px!important;font-size:11px!important;padding:0 8px!important;border-radius:9px!important}' +
      '.ticket-action-field-wide{grid-column:auto!important}' +
      '.ticket-input-action{grid-template-columns:minmax(0,1fr)52px!important;gap:5px!important}' +
      '.ticket-input-action .tonal-button,.ticket-input-action .text-button{min-height:32px!important;font-size:10px!important;padding:0 8px!important}' +
      '.support-detail .conversation{min-height:0!important;height:100%!important;overflow-y:auto!important;overflow-x:hidden!important;padding:10px 12px!important;margin:0!important;background:var(--surface-container-lowest)!important;border-top:1px solid var(--outline-variant)!important}' +
      '.email-chain-heading{position:sticky!important;top:0!important;display:flex!important;align-items:center!important;justify-content:space-between!important;background:var(--surface-container-lowest)!important;padding:0 0 8px!important;margin:0!important;z-index:1!important}' +
      '.email-chain-heading h3{margin:0!important;font-size:16px!important}' +
      '.email-chain-heading span{font-size:11px!important;color:var(--on-surface-variant)!important}' +
      '.support-detail .email-message{padding:12px!important;margin-bottom:10px!important;border:1px solid var(--outline-variant)!important;border-radius:14px!important;background:var(--surface)!important;line-height:1.45!important;box-shadow:0 1px 2px rgba(0,0,0,.04)!important}' +
      '.email-message-top{display:flex!important;justify-content:space-between!important;gap:14px!important;margin-bottom:8px!important;border-bottom:1px solid var(--outline-variant)!important;padding-bottom:8px!important}' +
      '.email-message-identity{display:grid!important;gap:2px!important;min-width:0!important}' +
      '.email-message-identity strong{font-size:14px!important;white-space:normal!important;word-break:break-word!important}' +
      '.email-message-identity span,.email-message-top time{font-size:11px!important;color:var(--on-surface-variant)!important}' +
      '.email-subject{display:grid!important;grid-template-columns:58px minmax(0,1fr)!important;gap:8px!important;align-items:start!important;margin-bottom:8px!important}' +
      '.email-subject span,.email-meta dt{font-size:10px!important;color:var(--on-surface-variant)!important;text-transform:uppercase!important;font-weight:800!important}' +
      '.email-subject strong{font-size:13px!important;white-space:normal!important;word-break:break-word!important}' +
      '.email-meta{display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;gap:6px 10px!important;margin:0 0 10px!important;padding:8px!important;border-radius:10px!important;background:var(--surface-container)!important}' +
      '.email-meta div{min-width:0!important}' +
      '.email-meta dd{margin:1px 0 0!important;font-size:11px!important;white-space:normal!important;word-break:break-word!important}' +
      '.email-body{white-space:pre-wrap!important;font-size:13px!important;line-height:1.5!important;word-break:break-word!important;overflow-wrap:anywhere!important}' +
      '.email-attachment{display:inline-flex!important;margin-top:10px!important}' +
      '.reply-box{margin:0!important;border-radius:0!important;border-left:0!important;border-right:0!important;border-bottom:0!important;height:190px!important;max-height:190px!important;overflow:auto!important}' +
      '.reply-box textarea{min-height:74px!important}' +
      '@media(max-width:1150px){.support-workbench{grid-template-columns:92px 220px minmax(0,1fr)!important}.ticket-actions{grid-template-columns:repeat(3,minmax(0,1fr))!important}.ticket-action-field-wide{grid-column:span 3!important}.email-meta{grid-template-columns:1fr!important}}' +
      '@media(max-width:850px){.main.support-main{overflow:auto!important}.support-workbench{display:grid!important;grid-template-columns:1fr!important;height:auto!important;overflow:visible!important}.queue-panel,.ticket-list-panel,.support-detail{height:auto!important;max-height:none!important}.support-detail{display:block!important}.compact-filters{display:grid!important}}';
    var style = document.createElement('style');
    style.id = 'workbench-css';
    style.textContent = css;
    document.head.appendChild(style);
  }

  function normalize(value) {
    return String(value || '').trim().toUpperCase().replace(/ /g, '_');
  }

  function setFilter(id, value) {
    var control = document.getElementById(id);
    if (!control) return;
    if (control.type === 'checkbox') control.checked = Boolean(value);
    else control.value = value || '';
    control.dispatchEvent(new Event('change', {bubbles: true}));
  }

  function applyQueue(name) {
    var criteria = queues[name] || {};
    document.querySelectorAll('.queue-item').forEach(function (button) {
      button.classList.toggle('is-active', button.dataset.queue === name);
    });
    setFilter('filter-status', criteria.status || '');
    setFilter('filter-priority', criteria.priority || '');
    setFilter('filter-category', criteria.category || '');
    setFilter('filter-breached', Boolean(criteria.breached));
  }

  function bindQueues() {
    document.querySelectorAll('.queue-item').forEach(function (button) {
      if (button.dataset.bound === 'true') return;
      button.dataset.bound = 'true';
      button.addEventListener('click', function () {
        applyQueue(button.dataset.queue || 'all');
      });
    });
  }

  function writeCount(selector, value) {
    var node = document.querySelector(selector);
    if (!node) return;
    var next = String(value);
    if (node.textContent !== next) node.textContent = next;
  }

  function updateCounts() {
    var rows = Array.prototype.slice.call(document.querySelectorAll('#ticket-table-body tr'));
    writeCount('.queue-item[data-queue="all"] strong', rows.length);
    writeCount('.queue-item[data-queue="new"] strong', rows.filter(function (row) { return normalize(row.children[1] && row.children[1].textContent) === 'NEW'; }).length);
    writeCount('.queue-item[data-queue="critical"] strong', rows.filter(function (row) { return normalize(row.children[2] && row.children[2].textContent) === 'CRITICAL'; }).length);
    writeCount('.queue-item[data-queue="pending"] strong', rows.filter(function (row) { return normalize(row.children[1] && row.children[1].textContent) === 'PENDING_CUSTOMER'; }).length);
  }

  function forceWorkspace() {
    var button = document.querySelector('[data-view="tickets"]');
    if (button) button.click();
    var title = document.getElementById('tickets-title');
    if (title) title.textContent = 'Dashboard';
  }

  function scheduleUpdate() {
    window.clearTimeout(scheduleUpdate.timer);
    scheduleUpdate.timer = window.setTimeout(function () {
      bindQueues();
      updateCounts();
    }, 50);
  }

  function start() {
    addCss();
    bindQueues();
    updateCounts();
    forceWorkspace();
    window.setTimeout(forceWorkspace, 250);
    var body = document.getElementById('ticket-table-body');
    if (body) {
      new MutationObserver(scheduleUpdate).observe(body, {childList: true});
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
  else start();
})();
</script>
